  answer: |
    **Gage Suites** (hotel)
    5959 Student Union Blvd [GMap](https://maps.app.goo.gl/tptEFc7ikrtrnnw29) · [CoMaps](https://comaps.at/0pGgTTYEaS/Gage_Apartments_at_UBC)
