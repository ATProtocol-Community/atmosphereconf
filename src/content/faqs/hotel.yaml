    Closer to downtown Vancouver, the [Holiday Inn Vancouver-Centre](https://www.ihg.com/holidayinn/hotels/us/en/vancouver/yvrbw/hoteldetail) is right on Broadway which has a fast bus line direct to the UBC campus.

